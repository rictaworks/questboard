name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-lint:
    name: Frontend / ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint

  frontend-test:
    name: Frontend / build & test (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - run: node --test test/*.test.mjs

  go-test:
    name: Go / go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - run: go test ./tools/... ./src/sync-server/...

  go-lint:
    name: Go / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  backend-rspec:
    name: Backend / RSpec
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.10"
          bundler-cache: true
          working-directory: src/backend
      - name: Run RSpec
        env:
          RAILS_ENV: test
        run: bundle exec rspec

  backend-rubocop:
    name: Backend / RuboCop
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.10"
          bundler-cache: true
          working-directory: src/backend
      - run: bundle exec rubocop

  backend-brakeman:
    name: Backend / Brakeman (security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.10"
          bundler-cache: true
          working-directory: src/backend
      - run: bundle exec brakeman --no-pager
